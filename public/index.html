<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop · SportZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- ═══ NAVBAR ═══════════════════════════════════════════════ -->
<header class="navbar">
  <a class="logo" href="/">SPORT<span>ZONE</span></a>
  <nav class="nav-links" id="nav-auth">
    <a href="/login">Login</a>
    <a class="btn btn-primary" href="/signup">Sign Up</a>
  </nav>
</header>

<!-- ═══ HERO ══════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-content">
    <p class="hero-eyebrow">New Season · New Gear</p>
    <h1>GEAR UP.<br/>PLAY<br/>HARDER.</h1>
    <p class="hero-sub">Premium sports equipment delivered to your door. Trusted by champions.</p>
    <a class="btn btn-primary btn-lg" href="#products">Shop All Gear</a>
  </div>
  <div class="hero-img-wrap">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=800&q=80" alt="Athlete" class="hero-img"/>
  </div>
</section>

<!-- ═══ CATEGORIES STRIP ═════════════════════════════════════ -->
<section class="cats-strip" id="cats-strip">
  <button class="cat-chip active" data-cat="">All Gear</button>
  <button class="cat-chip" data-cat="Football">⚽ Football</button>
  <button class="cat-chip" data-cat="Basketball">🏀 Basketball</button>
  <button class="cat-chip" data-cat="Cricket">🏏 Cricket</button>
  <button class="cat-chip" data-cat="Tennis">🎾 Tennis</button>
  <button class="cat-chip" data-cat="Fitness">💪 Fitness</button>
  <button class="cat-chip" data-cat="Swimming">🏊 Swimming</button>
</section>

<!-- ═══ PRODUCTS ══════════════════════════════════════════════ -->
<section class="shop" id="products">
  <div class="container">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="text" id="searchInput" placeholder="Search products…"/>
      </div>
      <button class="btn btn-primary" id="searchBtn">Search</button>
      <button class="btn btn-ghost" id="clearBtn" style="display:none;">Clear</button>
    </div>

    <div class="shop-heading">
      <h2 id="heading-title">All Products</h2>
      <span class="count" id="product-count"></span>
    </div>

    <div id="products-grid" class="products-grid">
      <div class="spinner"></div>
    </div>

  </div>
</section>

<!-- ═══ FOOTER ════════════════════════════════════════════════ -->
<footer class="footer">
  <div class="footer-inner">
    <span class="logo">SPORT<span>ZONE</span></span>
    <p>© 2025 SportZone · Built for Champions</p>
    <div class="footer-cats">
      <a href="#" data-cat="Football">Football</a>
      <a href="#" data-cat="Basketball">Basketball</a>
      <a href="#" data-cat="Cricket">Cricket</a>
      <a href="#" data-cat="Tennis">Tennis</a>
      <a href="#" data-cat="Fitness">Fitness</a>
      <a href="#" data-cat="Swimming">Swimming</a>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  let currentCategory = '';
  let currentSearch   = '';

  /* ── Render Product Cards ── */
  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    const count = document.getElementById('product-count');
    count.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;

    if (products.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <p>😕 No products found.</p>
          <button class="btn btn-primary" onclick="loadProducts()">View All</button>
        </div>`;
      return;
    }

    grid.innerHTML = products.map(p => `
      <div class="product-card fade-in">
        <a class="card-img-link" href="/product/${p._id}">
          <img src="${p.image}" alt="${p.name}" loading="lazy"/>
          <span class="cat-tag">${p.category}</span>
        </a>
        <div class="card-body">
          <a class="card-title" href="/product/${p._id}">${p.name}</a>
          <p class="card-desc">${p.description.substring(0, 72)}…</p>
          <div class="card-footer">
            <span class="price">₹${p.price.toLocaleString('en-IN')}</span>
            <span class="stars">★ ${p.rating}</span>
          </div>
          <button class="btn btn-add" onclick="addToCart('${p._id}')">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  /* ── Load Products from API ── */
  async function loadProducts(cat = '', search = '') {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div class="spinner"></div>';

    const params = new URLSearchParams();
    if (cat)    params.set('category', cat);
    if (search) params.set('search', search);

    const res  = await fetch('/api/products?' + params.toString());
    const data = await res.json();
    renderProducts(data.products || []);

    document.getElementById('heading-title').textContent = cat || 'All Products';
    document.getElementById('clearBtn').style.display = (cat || search) ? '' : 'none';
  }

  /* ── Category chips ── */
  document.getElementById('cats-strip').addEventListener('click', (e) => {
    const chip = e.target.closest('.cat-chip');
    if (!chip) return;
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentCategory = chip.dataset.cat;
    currentSearch   = '';
    document.getElementById('searchInput').value = '';
    loadProducts(currentCategory);
  });

  /* ── Footer category links ── */
  document.querySelectorAll('.footer-cats a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      currentCategory = a.dataset.cat;
      document.querySelectorAll('.cat-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.cat === currentCategory);
      });
      loadProducts(currentCategory);
      document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
    });
  });

  /* ── Search ── */
  document.getElementById('searchBtn').addEventListener('click', () => {
    currentSearch = document.getElementById('searchInput').value.trim();
    loadProducts(currentCategory, currentSearch);
  });
  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    currentCategory = '';
    currentSearch   = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === ''));
    loadProducts();
  });

  // Initial load
  loadProducts();
</script>
</body>
</html>
