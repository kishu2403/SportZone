<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product · SportZone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<header class="navbar">
  <a class="logo" href="/">SPORT<span>ZONE</span></a>
  <nav class="nav-links" id="nav-auth">
    <a href="/login">Login</a>
    <a class="btn btn-primary" href="/signup">Sign Up</a>
  </nav>
</header>

<div class="container" id="product-container">
  <div class="spinner"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span class="logo">SPORT<span>ZONE</span></span>
    <p>© 2025 SportZone · Built for Champions</p>
    <div class="footer-cats">
      <a href="/?category=Football">Football</a>
      <a href="/?category=Basketball">Basketball</a>
      <a href="/?category=Cricket">Cricket</a>
      <a href="/?category=Tennis">Tennis</a>
      <a href="/?category=Fitness">Fitness</a>
      <a href="/?category=Swimming">Swimming</a>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
  /* Get product ID from URL: /product/XXXX */
  const productId = window.location.pathname.split('/').pop();

  async function loadProduct() {
    const container = document.getElementById('product-container');
    try {
      const res  = await fetch(`/api/products/${productId}`);
      if (!res.ok) { window.location.href = '/'; return; }
      const { product, related } = await res.json();

      document.title = `${product.name} · SportZone`;

      container.innerHTML = `
        <a class="back-link" href="/">← Back to Shop</a>

        <div class="detail-grid fade-in">
          <div class="detail-img">
            <img src="${product.image}" alt="${product.name}"/>
          </div>
          <div class="detail-info">
            <span class="cat-tag">${product.category}</span>
            <h1 class="detail-name">${product.name}</h1>
            <div class="detail-rating">
              <span class="stars-lg">★★★★★</span>
              <span class="rating-val">${product.rating} / 5</span>
            </div>
            <p class="detail-desc">${product.description}</p>
            <div class="detail-price">₹${product.price.toLocaleString('en-IN')}</div>
            <p class="detail-stock">${product.stock > 0 ? `✅ ${product.stock} in stock` : '❌ Out of stock'}</p>

            ${product.stock > 0 ? `
              <div class="detail-form">
                <div class="qty-row">
                  <label>Qty</label>
                  <div class="qty-controls">
                    <button onclick="changeQty(-1)">−</button>
                    <span id="qty-display">1</span>
                    <button onclick="changeQty(1)">+</button>
                  </div>
                </div>
                <button class="btn btn-primary btn-lg" onclick="handleAddToCart('${product._id}')">
                  🛒 Add to Cart
                </button>
              </div>
            ` : ''}
          </div>
        </div>

        ${related.length > 0 ? `
          <section class="related">
            <h2>More in ${product.category}</h2>
            <div class="products-grid">
              ${related.map(p => `
                <div class="product-card">
                  <a class="card-img-link" href="/product/${p._id}">
                    <img src="${p.image}" alt="${p.name}" loading="lazy"/>
                  </a>
                  <div class="card-body">
                    <a class="card-title" href="/product/${p._id}">${p.name}</a>
                    <div class="card-footer">
                     <span class="price">₹${p.price.toLocaleString('en-IN')}</span>
                      <span class="stars">★ ${p.rating}</span>
                    </div>
                    <button class="btn btn-add" onclick="addToCart('${p._id}')">Add to Cart</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </section>
        ` : ''}
      `;
    } catch (err) {
      container.innerHTML = `<p style="text-align:center;padding:5rem;color:var(--muted)">Failed to load product.</p>`;
    }
  }

  let qty = 1;
  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    const el = document.getElementById('qty-display');
    if (el) el.textContent = qty;
  }

  async function handleAddToCart(productId) {
    await addToCart(productId, qty);
  }

  loadProduct();
</script>
</body>
</html>
